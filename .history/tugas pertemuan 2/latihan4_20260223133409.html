<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Galeri Kegiatan Denvi Sekartazi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: #f9f9f9; }
        nav { background: #5d4037; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        nav a { color: white; text-decoration: none; margin-right: 20px; font-weight: bold; }
        
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
        }
        
        figure { 
            background: white; 
            margin: 0; 
            padding: 10px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            text-align: center;
        }
        
        img { width: 100%; border-radius: 5px; transition: transform 0.3s; }
        img:hover { transform: scale(1.05); }
        
        figcaption { margin-top: 10px; font-size: 0.9em; color: #555; font-style: italic; }
        
        .video-section { margin-top: 40px; text-align: center; }
        video { max-width: 100%; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <nav>
        <a href="#foto">Galeri Foto</a>
        <a href="#video">Dokumentasi Video</a>
        <a href="mailto:denvi@gmail.com">Kontak</a>
    </nav>

    <h1 id="foto">Galeri Kegiatan Sosial</h1>
    <p>Klik pada gambar untuk melihat detail kegiatan lebih lanjut.</p>

    <div class="gallery-grid">
        <figure>
            <a href="https://id.wikipedia.org/wiki/Pusat_Informasi_dan_Konseling_Remaja" target="_blank">
                <img src="http://googleusercontent.com/image_collection/image_retrieval/13699930040389969116_0" alt="Kegiatan PIK-R">
            </a>
            <figcaption>Pengukuhan Anggota PIK-R - Klik gambar untuk info organisasi.</figcaption>
        </figure>

        <figure>
            <a href="#">
                <img src="https://via.placeholder.com/300x200?text=Bagi-bagi+Takjil" alt="Takjil">
            </a>
            <figcaption>Momen berbagi keceriaan saat Bagi-bagi Takjil.</figcaption>
        </figure>

        <figure>
            <a href="#">
                <img src="https://via.placeholder.com/300x200?text=Panitia+17an" alt="Panitia 17 Agustus">
            </a>
            <figcaption>Kekompakan Panitia HUT RI ke-78.</figcaption>
        </figure>
    </div>

    <div id="video" class="video-section">
        <hr>
        <h2>Highlight Video Kegiatan</h2>
        <p>Tonton cuplikan keseruan kegiatan lapangan kami.</p>
        <video width="640" height="360" controls>
            <source src="movie.mp4" type="video/mp4">
            <source src="movie.ogg" type="video/ogg">
            
        </video>
    </div>

</body>
</html>
