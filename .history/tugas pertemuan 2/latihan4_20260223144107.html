<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Galeri Kegiatan Denvi Sekartazi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: #f9f9f9; }
        nav { background: #ff83d1; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        nav a { color: white; text-decoration: none; margin-right: 20px; font-weight: bold; }
        
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
        }
        
        figure { 
            background: white; 
            margin: 0; 
            padding: 10px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            text-align: center;
        }
        
        img { width: 100%; border-radius: 5px; transition: transform 0.3s; }
        img:hover { transform: scale(1.05); }
        
        figcaption { margin-top: 10px; font-size: 0.9em; color: #e391ed; font-style: italic; }
        
        .video-section { margin-top: 40px; text-align: center; }
        video { max-width: 100%; border-radius: 10px; box-shadow: 0 4px 10px rgba(241, 96, 164, 0.89); }
    </style>
</head>
<body>

    <nav>
        <a href="#foto">Galeri Foto</a>
        <a href="#video">Dokumentasi Video</a>
        <a href="mailto:denvi@gmail.com">Kontak</a>
    </nav>

    <h1 id="foto">Galeri Kegiatan Sosial</h1>
    <p>Klik pada gambar untuk melihat detail kegiatan lebih lanjut.</p>

    <div class="gallery-grid">
    <figure>
        <img src="images/foto1.jpeg" alt="Kegiatan 1">
        <figcaption>Menjadi Mc di Kegiatan Pelantikan Bem.</figcaption>
    </figure>

    <figure>
        <img src="images/foto2.jpeg" alt="Kegiatan 2">
        <figcaption>Kegiatan Kunjungan Ke Sekolah SMA 1 Dramaga.</figcaption>
    </figure>

    <figure>
        <img src="images/foto3.jpeg" alt="Kegiatan 3">
        <figcaption>Kegiatan Sosial Posyandu Remaja.</figcaption>
    </figure>

    <figure>
        <img src="images/foto4.jpeg" alt="Kegiatan 4">
        <figcaption>Pengukuhan Anggota PIK-R bersama tim.</figcaption>
    </figure>

    <figure>
        <img src="images/foto5.jpeg" alt="Kegiatan 5">
        <figcaption>Momen kebersamaan bersama teman-teman.</figcaption>
    </figure>
</div>

    <div id="video" class="video-section">
    <hr>
    <h2>Highlight Video Kegiatan</h2>
    <p>Tonton cuplikan keseruan kegiatan lapangan kami.</p>

    <video controls>
        <source src="videos/Video Kegiatan Posyandu.mp4" type="video/mp4">
        Browser Anda tidak mendukung video HTML5.
    </video>
</div>

</body>
</html>
