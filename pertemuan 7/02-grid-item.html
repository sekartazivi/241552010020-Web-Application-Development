<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02- properti grid item</title>
    <link rel="stylesheet" href="02-grid-item.css">
</head>
<body>
  <h1>02 — Properti Grid Item</h1>

  <h2>1. grid-column-start / grid-column-end</h2>
  <p class="kode">grid-column-start: 2; grid-column-end: 4;</p>
  <div class="grid demo1">
    <div class="item">1</div>
    <div class="item highlight">2 (col 2→4)</div>
    <div class="item">3</div>
    <div class="item">4</div><div class="item">5</div>
    <div class="item">6</div><div class="item">7</div>
  </div>

  <h2>2. grid-column (shorthand)</h2>
  <p class="kode">grid-column: 1 / 3;</p>
  <div class="grid demo2">
    <div class="item highlight">col 1/3</div>
    <div class="item">2</div><div class="item">3</div>
    <div class="item">4</div><div class="item">5</div>
    <div class="item">6</div><div class="item">7</div>
  </div>

  <h2>3. grid-row</h2>
  <p class="kode">grid-row: 1 / 3;</p>
  <div class="grid demo3">
    <div class="item highlight">row 1-3</div>
    <div class="item">2</div><div class="item">3</div><div class="item">4</div>
    <div class="item">5</div><div class="item">6</div><div class="item">7</div>
    <div class="item">8</div><div class="item">9</div>
  </div>
<body>
</html>
